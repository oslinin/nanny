<!--
  GitHub Pages copy of ../web/index.html.

  This is a static mirror, not the source of truth — if you change
  web/index.html, re-apply those changes here too (see README's Deployment
  section). The only difference from web/index.html is the config block
  right below: it points this page at a separately-hosted Cloud Run backend
  instead of assuming same-origin relative paths.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nanny — Baby Activity Tracker</title>
<script>
  // Fill these in after `gcloud run deploy` prints your service URL.
  window.NANNY_API_BASE = "https://REPLACE-WITH-YOUR-CLOUD-RUN-URL.a.run.app";
  // Only needed if you deployed with NANNY_API_TOKEN set (see README).
  window.NANNY_API_TOKEN = "";
</script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f2ee;
    --panel: #ffffff;
    --ink: #2b2420;
    --muted: #7a7168;
    --accent: #c97b63;
    --accent-ink: #ffffff;
    --border: #e5ddd3;
    --bubble: #f0ebe4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1815;
      --panel: #26211d;
      --ink: #f1ece5;
      --muted: #a89e92;
      --accent: #e08f6f;
      --accent-ink: #241a14;
      --border: #3a332c;
      --bubble: #322b25;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 1.15rem; }
  header p { margin: 0.15rem 0 0; color: var(--muted); font-size: 0.85rem; }
  .banner {
    margin: 1rem 1.5rem 0;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    background: #c0554422;
    border: 1px solid #c0554488;
    font-size: 0.85rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    padding: 1rem;
    max-width: 980px;
    margin: 0 auto;
  }
  @media (min-width: 800px) {
    .layout { grid-template-columns: 1fr 1fr; align-items: start; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }
  .panel h2 {
    margin: 0 0 0.75rem;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .taps {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }
  button.tap {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bubble);
    color: var(--ink);
    border-radius: 10px;
    padding: 0.9rem 0.6rem;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  button.tap:hover { background: var(--accent); color: var(--accent-ink); }
  button.tap:active { transform: scale(0.97); }
  button.tap:disabled { opacity: 0.5; cursor: default; }
  .log {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-height: 420px;
    overflow-y: auto;
    margin-bottom: 0.75rem;
    padding-right: 0.25rem;
  }
  .msg {
    padding: 0.55rem 0.75rem;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.35;
    max-width: 90%;
  }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--accent-ink); }
  .msg.agent { align-self: flex-start; background: var(--bubble); }
  .msg.agent.error { border: 1px solid #c0554488; }
  .msg .tag {
    display: block;
    font-size: 0.7rem;
    opacity: 0.7;
    margin-bottom: 0.15rem;
  }
  form.chat-input {
    display: flex;
    gap: 0.5rem;
  }
  form.chat-input input {
    flex: 1;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    font-size: 0.95rem;
  }
  form.chat-input button {
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    border-radius: 8px;
    padding: 0 1rem;
    cursor: pointer;
    font-size: 0.95rem;
  }
  form.chat-input button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<header>
  <h1>Nanny</h1>
  <p>Local baby activity tracker — quick-tap dashboard + AI chat, one shared log.</p>
</header>
<div class="banner" id="config-banner" hidden>
  ⚠️ This page's NANNY_API_BASE still points at the placeholder URL — edit the
  config block near the top of docs/index.html with your real Cloud Run
  service URL.
</div>
<div class="layout">
  <section class="panel">
    <h2>Quick-Tap Controls</h2>
    <div class="taps">
      <button class="tap" data-type="bottle" data-qty="4" data-unit="oz" data-label="+4oz Bottle">+4oz Bottle</button>
      <button class="tap" data-type="milk" data-qty="2" data-unit="oz" data-label="+2oz Breastmilk">+2oz Breastmilk</button>
      <button class="tap" data-type="poop" data-qty="1" data-unit="count" data-label="Log 1 Poop">Log 1 Poop</button>
      <button class="tap" data-type="wet" data-qty="1" data-unit="count" data-label="Log 1 Wet Diaper">Log 1 Wet Diaper</button>
      <button class="tap" data-type="solids" data-qty="50" data-unit="grams" data-label="+50g Solids">+50g Solids</button>
    </div>
  </section>
  <section class="panel">
    <h2>AI Chat Log</h2>
    <div class="log" id="log"></div>
    <form class="chat-input" id="chat-form">
      <input id="chat-text" type="text" placeholder='Type a message (e.g., &quot;pooped at 3&quot;)' autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </section>
</div>
<script>
const API_BASE = window.NANNY_API_BASE || '';
const API_TOKEN = window.NANNY_API_TOKEN || '';

if (API_BASE.includes('REPLACE-WITH-YOUR-CLOUD-RUN-URL')) {
  document.getElementById('config-banner').hidden = false;
}

const log = document.getElementById('log');

function addMessage(role, text, isError) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isError ? ' error' : '');
  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.textContent = role === 'user' ? 'You' : 'Nanny Agent';
  div.appendChild(tag);
  div.appendChild(document.createTextNode(text));
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function postJSON(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (API_TOKEN) headers['X-Nanny-Token'] = API_TOKEN;
  const res = await fetch(API_BASE + path, { method: 'POST', headers, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

document.querySelectorAll('button.tap').forEach((btn) => {
  btn.addEventListener('click', async () => {
    const { type, qty, unit, label } = btn.dataset;
    addMessage('user', label);
    btn.disabled = true;
    try {
      const data = await postJSON('/api/quick-tap', {
        activity_type: type,
        quantity: parseFloat(qty),
        unit: unit,
        notes: '',
      });
      addMessage('agent', data.response_text, !data.ok);
    } catch (err) {
      addMessage('agent', 'Error: ' + err.message, true);
    } finally {
      btn.disabled = false;
    }
  });
});

document.getElementById('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('chat-text');
  const text = input.value.trim();
  if (!text) return;
  addMessage('user', text);
  input.value = '';
  input.disabled = true;
  try {
    const data = await postJSON('/api/chat', { text });
    addMessage('agent', data.response_text, !data.ok);
  } catch (err) {
    addMessage('agent', 'Error: ' + err.message, true);
  } finally {
    input.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
